<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAM WORKS</title>
  <meta name="description" content="Great things coming soon." />

  <!-- Open Graph (링크 공유 시 미리보기) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="EAM WORKS" />
  <meta property="og:description" content="Great things coming soon." />
  <meta property="og:url" content="https://eam.works/" />
  <meta property="og:image" content="https://eam.works/og-image.png" />

  <!-- Twitter 카드 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EAM WORKS" />
  <meta name="twitter:description" content="Great things coming soon." />
  <meta name="twitter:image" content="https://eam.works/og-image.png" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <!-- Brandon Grotesque (Adobe Fonts) -->
  <link rel="stylesheet" href="https://use.typekit.net/epu2yts.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "brandon-grotesque", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
      color: #21242A;
      background: #FFFAF0;
      overflow: hidden;
    }

    /* 전체 레이아웃: 중앙 콘텐츠 + 하단 푸터 */
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .logo {
      width: min(340px, 72vw);
      height: auto;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    /* 이메일 입력 폼 */
    .notify-form {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      width: min(420px, 85vw);
    }

    .notify-form input {
      flex: 1;
      min-width: 0;
      font-family: inherit;
      font-weight: 500;
      font-size: 0.95rem;
      color: #21242A;
      background: transparent;
      border: 1px solid rgba(33, 36, 42, 0.35);
      border-radius: 6px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input::placeholder {
      color: rgba(33, 36, 42, 0.45);
    }

    .notify-form input:focus {
      border-color: #21242A;
    }

    .notify-form button {
      font-family: inherit;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: #FFFAF0;
      background: #21242A;
      border: none;
      border-radius: 6px;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .notify-form button:hover {
      opacity: 0.85;
    }

    .form-message {
      font-size: 0.85rem;
      min-height: 1.2em;
      opacity: 0.75;
    }

    footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    /* 모바일: 입력칸과 버튼을 세로로 */
    @media (max-width: 480px) {
      .notify-form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="center">
      <img class="logo" src="logo.svg" alt="Eam Works" />
      <p class="tagline">Great things coming soon.</p>

      <form class="notify-form" id="notifyForm">
        <input type="email" name="email" id="emailInput" placeholder="Your email address" required autocomplete="email" />
        <button type="submit">Notify Me</button>
      </form>
      <p class="form-message" id="formMessage"></p>
    </div>
  </main>

  <footer>
    <span id="year"></span> © Eam Works
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Web3Forms 이메일 수집
    var ACCESS_KEY = "YOUR_WEB3FORMS_ACCESS_KEY"; // web3forms.com에서 발급받은 키로 교체
    var form = document.getElementById("notifyForm");
    var message = document.getElementById("formMessage");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      if (ACCESS_KEY === "YOUR_WEB3FORMS_ACCESS_KEY") {
        message.textContent = "Sign-up opens soon — please check back!";
        return;
      }

      var button = form.querySelector("button");
      button.disabled = true;
      message.textContent = "";

      fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify({
          access_key: ACCESS_KEY,
          subject: "New sign-up — eam.works",
          email: document.getElementById("emailInput").value
        })
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.success) {
            form.reset();
            message.textContent = "Thank you! We'll keep you posted.";
          } else {
            message.textContent = "Something went wrong. Please try again.";
          }
        })
        .catch(function () {
          message.textContent = "Something went wrong. Please try again.";
        })
        .finally(function () {
          button.disabled = false;
        });
    });
  </script>
</body>
</html>
